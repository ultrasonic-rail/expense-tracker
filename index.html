<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<title>Expenses</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#222240;--accent:#e94560;--accent2:#0f3460;--text:#eee;--text-dim:#8888aa;--green:#00d2a0;--gold:#d4a017;--cyan:#00bcd4;--orange:#ff9800;--border:#2a2a4a;--radius:12px;--shadow:0 4px 24px rgba(0,0,0,.4)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}
.header{background:var(--surface);padding:16px 20px 0;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header h1{font-size:20px;font-weight:800;letter-spacing:-.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.header h1 span{color:var(--accent)}
.tabs-wrap{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}.tabs-wrap::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:8px 16px;font-size:13px;font-weight:700;color:var(--text-dim);background:transparent;border:none;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:inherit}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.add-section{padding:16px 20px;background:var(--surface);margin:12px;border-radius:var(--radius);box-shadow:var(--shadow)}
.form-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0}
.form-group label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim)}
.form-group select,.form-group input{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-size:15px;font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .2s;width:100%}
.form-group select:focus,.form-group input:focus{border-color:var(--accent)}
.btn-add{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:transform .1s,opacity .2s;margin-top:4px}
.btn-add:active{transform:scale(.97);opacity:.9}
.entries-section{padding:0 12px 120px}
.summary-bar{background:var(--surface);border-radius:var(--radius);margin-bottom:8px;padding:14px 16px;font-family:'JetBrains Mono',monospace;font-size:14px}
.summary-main{display:flex;justify-content:space-between}
.summary-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.summary-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);font-family:'Nunito',sans-serif;font-weight:700}
.summary-value{font-weight:600;font-size:16px}
.summary-value.total{color:var(--accent)}.summary-value.avg{color:var(--green)}.summary-value.count{color:var(--text-dim)}
.summary-tracked{border-top:1px solid var(--border);margin-top:12px;padding-top:10px;display:flex;flex-wrap:wrap;gap:6px 16px;font-size:13px}
.summary-tracked-item{display:flex;align-items:center;gap:4px}
.summary-tracked-star{color:var(--gold)}.summary-tracked-cat{color:var(--text-dim)}.summary-tracked-val{font-weight:600;color:var(--text)}
.summary-income{border-top:1px solid var(--border);margin-top:10px;padding-top:10px;display:flex;justify-content:space-between;align-items:center;font-size:13px;gap:8px}
.summary-income-label{color:var(--text-dim);white-space:nowrap}
.summary-income input{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 10px;font-size:14px;width:120px;font-family:'JetBrains Mono',monospace;outline:none;text-align:right}
.summary-income input:focus{border-color:var(--accent)}
.summary-balance{border-top:1px solid var(--border);margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;font-size:14px}
.summary-balance-label{color:var(--text-dim);font-weight:700}
.summary-balance-val{font-family:'JetBrains Mono',monospace;font-weight:600}
.summary-balance-val.positive{color:var(--green)}.summary-balance-val.negative{color:var(--accent)}
.noti-status{border-top:1px solid var(--border);margin-top:8px;padding-top:8px;font-size:11px;color:var(--text-dim);display:flex;justify-content:space-between;align-items:center}
.noti-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.noti-dot.on{background:var(--green)}.noti-dot.off{background:var(--accent)}
.entry-card{background:var(--surface);border-radius:var(--radius);padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:8px;animation:slideIn .3s ease}
.entry-card.auto{border-left:3px solid var(--orange)}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.entry-cat{background:var(--accent2);color:var(--text);padding:4px 8px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.entry-cat:active{opacity:.7}
.entry-body{flex:1;min-width:0}
.entry-date{font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
.entry-place{font-size:11px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.entry-amount{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:15px;color:var(--accent);white-space:nowrap}
.entry-del{background:none;border:none;color:var(--text-dim);font-size:16px;cursor:pointer;padding:2px 6px;opacity:.5;transition:opacity .2s,color .2s}
.entry-del:hover,.entry-del:active{opacity:1;color:var(--accent)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:14px}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.settings-toggle{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;padding:4px;margin-left:auto}
.settings-panel{display:none;padding:16px 20px;background:var(--surface);margin:12px;border-radius:var(--radius);box-shadow:var(--shadow)}
.settings-panel.open{display:block}
.settings-panel h3{font-size:14px;margin-bottom:8px;color:var(--text-dim)}
.cat-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.cat-chip{display:flex;align-items:center;gap:5px;background:var(--accent2);padding:6px 10px;border-radius:6px;font-size:13px;font-weight:600}
.cat-chip button{background:none;border:none;color:var(--text-dim);font-size:14px;cursor:pointer;padding:0 2px}
.cat-icon{cursor:pointer;font-size:14px;user-select:none;-webkit-user-select:none}
.cat-icon.on-sum{color:var(--gold)}.cat-icon.on-avg{color:var(--cyan)}.cat-icon.on-filter{color:var(--green)}.cat-icon.off{color:var(--text-dim);opacity:.4}
.cat-legend{font-size:11px;color:var(--text-dim);margin-bottom:10px;line-height:1.6}
.cat-add-row{display:flex;gap:8px}
.cat-add-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 12px;font-size:14px;font-family:inherit;outline:none}
.cat-add-row button{background:var(--accent2);border:none;color:var(--text);padding:8px 14px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.map-section{margin-top:12px}
.map-list{max-height:150px;overflow-y:auto;margin-bottom:8px}
.map-item{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px;border-bottom:1px solid var(--border)}
.map-item .mk{color:var(--text-dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px}
.map-item .mv{color:var(--green);font-weight:600}
.map-item button{background:none;border:none;color:var(--text-dim);font-size:12px;cursor:pointer;padding:0 4px}
.export-row{margin-top:12px;display:flex;gap:6px;flex-wrap:wrap}
.export-row button{flex:1;min-width:80px;padding:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.confirm-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center}
.confirm-overlay.open{display:flex}
.confirm-box{background:var(--surface);border-radius:var(--radius);padding:24px;max-width:320px;width:90%;text-align:center;box-shadow:var(--shadow)}
.confirm-box p{margin-bottom:16px;font-size:15px}
.confirm-btns{display:flex;gap:8px}
.confirm-btns button{flex:1;padding:10px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-cancel{background:var(--surface2);color:var(--text)}.btn-confirm{background:var(--accent);color:#fff}
.cat-select-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:998;align-items:center;justify-content:center}
.cat-select-overlay.open{display:flex}
.cat-select-box{background:var(--surface);border-radius:var(--radius);padding:16px;max-width:280px;width:90%;box-shadow:var(--shadow)}
.cat-select-box h4{font-size:14px;margin-bottom:10px;color:var(--text-dim);text-align:center}
.cat-select-btn{display:block;width:100%;padding:10px;margin-bottom:4px;background:var(--accent2);border:none;border-radius:8px;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;text-align:left}
.cat-select-btn:active{opacity:.7}
</style>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="header">
  <h1><span>●</span> Expenses <button class="settings-toggle" onclick="toggleSettings()">⚙</button></h1>
  <div class="tabs-wrap" id="tabs"></div>
</div>
<div class="settings-panel" id="settingsPanel">
  <h3>Категорії витрат</h3>
  <div class="cat-legend"><span style="color:var(--gold)">★</span> сума <span style="color:var(--cyan)">◉</span> середнє <span style="color:var(--green)">◎</span> фільтр</div>
  <div class="cat-list" id="catList"></div>
  <div class="cat-add-row"><input type="text" id="newCatInput" placeholder="Нова категорія..."><button onclick="addCategory()">+</button></div>
  <div class="map-section">
    <h3>Прив'язка місць → категорій</h3>
    <div class="map-list" id="mapList"></div>
    <div style="font-size:11px;color:var(--text-dim)">Автоматично: змініть категорію запису — місце запам'ятається</div>
  </div>
  <div class="export-row">
    <button onclick="backupShare()">📤 Бекап</button>
    <button onclick="importFromFile()">📂 З файлу</button>
    <button onclick="importJSON()">📋 Вставити</button>
    <button onclick="openNotiSettings()">🔔 Сповіщення</button>
  </div>
</div>
<div class="add-section">
  <div class="form-row">
    <div class="form-group" style="flex:1.2"><label>Вид</label><select id="catSelect"></select></div>
    <div class="form-group" style="flex:1.5"><label>Дата / час</label><input type="datetime-local" id="dateInput"></div>
    <div class="form-group" style="flex:0.8"><label>Сума</label><input type="number" id="amountInput" placeholder="0" inputmode="decimal" step="0.01"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>Місце</label><input type="text" id="placeInput" placeholder="Необов'язково"></div>
  </div>
  <button class="btn-add" onclick="addEntry()">Додати запис</button>
</div>
<div class="entries-section" id="entriesSection"></div>
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box"><p id="confirmText"></p>
    <div class="confirm-btns"><button class="btn-cancel" onclick="closeConfirm()">Скасувати</button><button class="btn-confirm" id="confirmBtn">OK</button></div>
  </div>
</div>
<div class="cat-select-overlay" id="catSelectOverlay">
  <div class="cat-select-box"><h4>Змінити категорію</h4><div id="catSelectList"></div>
    <button class="cat-select-btn" style="background:var(--surface2);margin-top:8px;text-align:center" onclick="closeCatSelect()">Скасувати</button>
  </div>
</div>
<input type="file" id="importFile" accept=".json" style="display:none">
<script>
const STORAGE_KEY='expense_tracker_data';
const DEFAULT_CATEGORIES=['Їжа','Транспорт','Житло',"Зв'язок",'Одяг',"Здоров'я",'Розваги','Інше'];
const RU_TO_UA={'Еда':'Їжа','Транспорт':'Транспорт','Жильё':'Житло','Связь':"Зв'язок",'Одежда':'Одяг','Здоровье':"Здоров'я",'Развлечения':'Розваги','Прочее':'Інше'};

function migrateData(d){
  d.entries.forEach(e=>{if(RU_TO_UA[e.category])e.category=RU_TO_UA[e.category];delete e.excluded;if(!e.place)e.place='';if(!e.auto)e.auto=false;});
  d.categories=[...new Set(d.categories.map(c=>RU_TO_UA[c]||c))];
  if(!d.trackedCategories)d.trackedCategories=[];
  d.trackedCategories=[...new Set(d.trackedCategories.map(c=>RU_TO_UA[c]||c))];
  if(!d.avgCategories)d.avgCategories=[];
  if(!d.filterCategories)d.filterCategories=[];
  if(!d.income)d.income={};
  if(!d.placeMap)d.placeMap={};
  if(!d.startBalance)d.startBalance={};
  return d;
}

let state=loadState();

function loadState(){
  try{const r=localStorage.getItem(STORAGE_KEY);if(r){const s=JSON.parse(r);
    if(!s.categories||!s.categories.length)s.categories=[...DEFAULT_CATEGORIES];
    if(!s.entries)s.entries=[];if(!s.trackedCategories)s.trackedCategories=[];
    if(!s.avgCategories)s.avgCategories=[];if(!s.filterCategories)s.filterCategories=[];
    if(!s.income)s.income={};if(!s.placeMap)s.placeMap={};if(!s.startBalance)s.startBalance={};
    return migrateData(s);}}catch(e){}
  return{categories:[...DEFAULT_CATEGORIES],trackedCategories:[],avgCategories:[],filterCategories:[],income:{},startBalance:{},placeMap:{},entries:[]};
}

function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}

function getPeriod(date){const d=new Date(date);let sY,sM;
  if(d.getDate()>=10){sY=d.getFullYear();sM=d.getMonth();}
  else{const p=new Date(d.getFullYear(),d.getMonth()-1,1);sY=p.getFullYear();sM=p.getMonth();}
  return{key:`${sY}-${String(sM).padStart(2,'0')}`,start:new Date(sY,sM,10,0,0,0),end:new Date(sY,sM+1,9,23,59,59),label:fmtP(new Date(sY,sM,10),new Date(sY,sM+1,9))};
}
function fmtP(s,e){const m=['січ','лют','бер','кві','тра','чер','лип','сер','вер','жов','лис','гру'];
  const a=`${s.getDate()} ${m[s.getMonth()]}`,b=`${e.getDate()} ${m[e.getMonth()]}`;
  return s.getFullYear()!==e.getFullYear()?`${a} ${s.getFullYear()} – ${b} ${e.getFullYear()}`:`${a} – ${b}`;}
function getAllPeriods(){const pm={};const cur=getPeriod(new Date());pm[cur.key]=cur;
  state.entries.forEach(e=>{const p=getPeriod(e.date);if(!pm[p.key])pm[p.key]=p;});
  return Object.values(pm).sort((a,b)=>b.start-a.start);}

let activePeriodKey=null;
function render(){renderCategories();renderCatSelect();renderTabs();renderEntries();renderPlaceMap();}
function renderTabs(){const periods=getAllPeriods();
  if(!activePeriodKey||!periods.find(p=>p.key===activePeriodKey))activePeriodKey=periods[0]?.key;
  const el=document.getElementById('tabs');
  el.innerHTML=periods.map(p=>`<button class="tab ${p.key===activePeriodKey?'active':''}" onclick="switchTab('${p.key}')">${p.label}</button>`).join('');
  setTimeout(()=>{const a=el.querySelector('.tab.active');if(a)a.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});},50);}
function switchTab(key){activePeriodKey=key;renderTabs();renderEntries();}

function renderEntries(){
  const section=document.getElementById('entriesSection');
  const period=getAllPeriods().find(p=>p.key===activePeriodKey);
  if(!period){section.innerHTML='<div class="empty-state"><div class="icon">📋</div>Немає періодів</div>';return;}
  const all=state.entries.filter(e=>{const d=new Date(e.date);return d>=period.start&&d<=period.end;}).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const allTotal=all.reduce((s,e)=>s+e.amount,0);
  const avgE=state.avgCategories.length>0?all.filter(e=>state.avgCategories.includes(e.category)):all;
  const grandTotal=avgE.reduce((s,e)=>s+e.amount,0);
  const uDays=(function(){
    const now=new Date();
    const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    const startDay=new Date(period.start.getFullYear(),period.start.getMonth(),period.start.getDate());
    const endDay=new Date(period.end.getFullYear(),period.end.getMonth(),period.end.getDate());
    const lastDay=endDay<today?endDay:today;
    const diff=Math.round((lastDay-startDay)/(1000*60*60*24))+1;
    return Math.max(diff,1);
  })();
  const avg=uDays?grandTotal/uDays:0;
  const dispE=state.filterCategories.length>0?all.filter(e=>state.filterCategories.includes(e.category)):all;
  const tSums={};state.trackedCategories.forEach(cat=>{tSums[cat]=all.filter(e=>e.category===cat).reduce((s,e)=>s+e.amount,0);});

  let h=`<div class="summary-bar"><div class="summary-main">
    <div class="summary-item"><span class="summary-label">Днів</span><span class="summary-value count">${uDays}</span></div>
    <div class="summary-item"><span class="summary-label">Разом</span><span class="summary-value total">${fN(grandTotal)}</span></div>
    <div class="summary-item"><span class="summary-label">Сер/день</span><span class="summary-value avg">${fN(avg)}</span></div></div>`;
  if(state.trackedCategories.length>0){h+=`<div class="summary-tracked">`;state.trackedCategories.forEach(cat=>{
    h+=`<div class="summary-tracked-item"><span class="summary-tracked-star">★</span><span class="summary-tracked-cat">${esc(cat)}:</span> <span class="summary-tracked-val">${fN(tSums[cat]||0)}</span></div>`;});h+=`</div>`;}
  const pSB=state.startBalance?state.startBalance[activePeriodKey]||0:0;
  h+=`<div class="summary-income"><span class="summary-income-label">На початок:</span><input type="number" id="startBalInput" value="${pSB||''}" placeholder="0" inputmode="decimal" step="0.01" onchange="setStartBal(this.value)" onblur="setStartBal(this.value)"></div>`;
  const pI=state.income[activePeriodKey]||0;
  h+=`<div class="summary-income"><span class="summary-income-label">Дохід:</span><input type="number" id="incomeInput" value="${pI||''}" placeholder="0" inputmode="decimal" step="0.01" onchange="setIncome(this.value)" onblur="setIncome(this.value)"></div>`;
  if(pI>0){const bal=pI-allTotal;h+=`<div class="summary-balance"><span class="summary-balance-label">Залишок:</span><span class="summary-balance-val ${bal>=0?'positive':'negative'}">${fN(bal)}</span></div>`;}
  // Noti status
  const hasNoti=typeof AndroidNoti!=='undefined';
  h+=`<div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px;font-size:11px;color:var(--text-dim)">`;
  if(!hasNoti){h+=`<div><span class="noti-dot off"></span>Авто — тільки в APK</div>`;}
  else{
    h+=`<div style="display:flex;gap:12px">`;
    h+=`<span onclick="openNotiSettingsPage()" style="cursor:pointer"><span class="noti-dot on"></span>IKO авто · <u>сповіщення</u></span>`;
    h+=`<span onclick="openBattSettings()" style="cursor:pointer"><span class="noti-dot on"></span><u>батарея</u></span>`;
    h+=`</div>`;
  }
  h+=`</div>`;
  h+=`</div>`;

  if(!dispE.length){h+=`<div class="empty-state"><div class="icon">📝</div>${all.length?'Немає записів для фільтру':'Немає записів'}<br><small>${all.length?'Змініть фільтр ⚙':'Додайте запис вище'}</small></div>`;}
  else{dispE.forEach(e=>{const d=new Date(e.date);
    const ds=`${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    h+=`<div class="entry-card ${e.auto?'auto':''}">
      <div class="entry-cat" title="${esc(e.category)}" onclick="openCatSelect('${e.id}')">${esc(e.category)}</div>
      <div class="entry-body"><div class="entry-date">${ds}</div>${e.place?`<div class="entry-place" title="${esc(e.place)}">${esc(e.place)}</div>`:''}</div>
      <div class="entry-amount" onclick="editAmount('${e.id}')">${fN(e.amount)}</div>
      <button class="entry-del" onclick="copyEntry('${e.id}')" title="Копія" style="color:var(--cyan)">⧉</button>
      <button class="entry-del" onclick="confirmDelete('${e.id}')" title="Видалити">✕</button></div>`;});}
  section.innerHTML=h;
}

function renderCategories(){
  document.getElementById('catList').innerHTML=state.categories.map(c=>{
    const sOn=state.trackedCategories.includes(c),aOn=state.avgCategories.includes(c),fOn=state.filterCategories.includes(c);
    return`<div class="cat-chip">
      <span class="cat-icon ${sOn?'on-sum':'off'}" data-action="toggleSum" data-cat="${eA(c)}">★</span>
      <span class="cat-icon ${aOn?'on-avg':'off'}" data-action="toggleAvg" data-cat="${eA(c)}">◉</span>
      <span class="cat-icon ${fOn?'on-filter':'off'}" data-action="toggleFilter" data-cat="${eA(c)}">◎</span>
      ${esc(c)} <button data-action="removecat" data-cat="${eA(c)}">✕</button></div>`;}).join('');}

function renderCatSelect(){document.getElementById('catSelect').innerHTML=state.categories.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');}

function renderPlaceMap(){
  const ml=document.getElementById('mapList');if(!ml)return;
  const keys=Object.keys(state.placeMap).sort();
  if(!keys.length){ml.innerHTML='<div style="font-size:12px;color:var(--text-dim);padding:4px 0">Поки порожньо</div>';return;}
  ml.innerHTML=keys.map(k=>`<div class="map-item"><span class="mk">${esc(k)}</span><span class="mv">${esc(state.placeMap[k])}</span><button onclick="deleteMapping('${eA(k)}')">✕</button></div>`).join('');}

function addEntry(){
  const cat=document.getElementById('catSelect').value;
  const dateVal=document.getElementById('dateInput').value;
  const amountVal=document.getElementById('amountInput').value;
  const place=document.getElementById('placeInput').value.trim();
  if(!amountVal||isNaN(parseFloat(amountVal))){shakeEl(document.getElementById('amountInput'));return;}
  const date=dateVal?new Date(dateVal).toISOString():new Date().toISOString();
  state.entries.push({id:uid(),category:cat,date,amount:parseFloat(parseFloat(amountVal).toFixed(2)),place,auto:false});
  if(place){const pk=placeKey(place);if(pk)state.placeMap[pk]=cat;}
  saveState();
  document.getElementById('amountInput').value='';document.getElementById('dateInput').value='';document.getElementById('placeInput').value='';
  activePeriodKey=getPeriod(date).key;render();
}

function addAutoEntry(amount,place,dateStr,forceCategory){
  const pk=placeKey(place);
  const cat=forceCategory||(pk&&state.placeMap[pk]?state.placeMap[pk]:(state.categories.includes('Інше')?'Інше':state.categories[0]));
  const date=(function(){
    if(!dateStr)return new Date().toISOString();
    const ds=dateStr.replace(/\./g,'-').trim();
    // If date only (no time part), add current time
    if(ds.length<=10){
      const now=new Date();
      return new Date(ds+'T'+pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds())).toISOString();
    }
    return new Date(ds).toISOString();
  })();
  // Check duplicate (same amount + date within 2 minutes)
  const dup=state.entries.find(e=>e.amount===amount&&Math.abs(new Date(e.date)-new Date(date))<120000);
  if(dup)return;
  state.entries.push({id:uid(),category:cat,date,amount,place,auto:true});
  saveState();render();
}

function setIncome(val){const n=parseFloat(val);if(!isNaN(n)&&n>0)state.income[activePeriodKey]=parseFloat(n.toFixed(2));else delete state.income[activePeriodKey];saveState();renderEntries();}

function setStartBal(val){const n=parseFloat(val);if(!isNaN(n)&&n>0){if(!state.startBalance)state.startBalance={};state.startBalance[activePeriodKey]=parseFloat(n.toFixed(2));}else{if(state.startBalance)delete state.startBalance[activePeriodKey];}saveState();renderEntries();}

function toggleArr(arr,val){const i=arr.indexOf(val);if(i>=0)arr.splice(i,1);else arr.push(val);}
function handleCatAction(action,cat){
  if(action==='toggleSum')toggleArr(state.trackedCategories,cat);
  else if(action==='toggleAvg')toggleArr(state.avgCategories,cat);
  else if(action==='toggleFilter')toggleArr(state.filterCategories,cat);
  else if(action==='removecat'){if(state.categories.length<=1)return;state.categories=state.categories.filter(c=>c!==cat);state.trackedCategories=state.trackedCategories.filter(c=>c!==cat);state.avgCategories=state.avgCategories.filter(c=>c!==cat);state.filterCategories=state.filterCategories.filter(c=>c!==cat);}
  saveState();render();}

// Category select for existing entries
let catSelectEntryId=null;
function openCatSelect(id){catSelectEntryId=id;
  const el=document.getElementById('catSelectList');
  el.innerHTML=state.categories.map(c=>`<button class="cat-select-btn" data-cat="${eA(c)}">${esc(c)}</button>`).join('');
  el.onclick=(ev)=>{const btn=ev.target.closest('[data-cat]');if(btn)changeCat(btn.dataset.cat);};
  document.getElementById('catSelectOverlay').classList.add('open');}
function closeCatSelect(){document.getElementById('catSelectOverlay').classList.remove('open');catSelectEntryId=null;}
function changeCat(newCat){
  const e=state.entries.find(x=>x.id===catSelectEntryId);
  if(e){const oldCat=e.category;e.category=newCat;
    if(e.place){const pk=placeKey(e.place);if(pk)state.placeMap[pk]=newCat;}
    saveState();render();}closeCatSelect();}

function deleteMapping(key){delete state.placeMap[key];saveState();renderPlaceMap();}

function copyEntry(id){
  const e=state.entries.find(x=>x.id===id);
  if(!e)return;
  state.entries.push({id:uid(),category:e.category,date:new Date().toISOString(),amount:e.amount,place:e.place,auto:false});
  saveState();render();
}

function editAmount(id){
  const e=state.entries.find(x=>x.id===id);
  if(!e)return;
  document.getElementById('confirmText').innerHTML=`<div style="text-align:left;font-size:13px;margin-bottom:8px">${esc(e.category)} · ${fN(e.amount)}</div><input type="number" id="editAmountInput" value="${e.amount}" step="0.01" inputmode="decimal" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-size:16px;font-family:JetBrains Mono,monospace;outline:none;text-align:center">`;
  document.getElementById('confirmOverlay').classList.add('open');
  document.getElementById('confirmBtn').textContent='Зберегти';
  document.getElementById('confirmBtn').onclick=()=>{
    const val=parseFloat(document.getElementById('editAmountInput').value);
    if(!isNaN(val)&&val>=0){e.amount=parseFloat(val.toFixed(2));saveState();render();}
    closeConfirm();
  };
  setTimeout(()=>{const inp=document.getElementById('editAmountInput');if(inp){inp.focus();inp.select();}},100);
}

let pendingDeleteId=null;
function confirmDelete(id){pendingDeleteId=id;
  document.getElementById('confirmText').textContent='Видалити цей запис?';
  document.getElementById('confirmOverlay').classList.add('open');
  document.getElementById('confirmBtn').textContent='Видалити';
  document.getElementById('confirmBtn').onclick=()=>{state.entries=state.entries.filter(e=>e.id!==pendingDeleteId);saveState();closeConfirm();render();};}
function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('open');pendingDeleteId=null;}

function addCategory(){const input=document.getElementById('newCatInput');const name=input.value.trim();
  if(!name||state.categories.includes(name))return;state.categories.push(name);saveState();input.value='';render();}
function toggleSettings(){document.getElementById('settingsPanel').classList.toggle('open');}

function openNotiSettingsPage(){
  if(typeof AndroidNoti!=='undefined'&&AndroidNoti.openNotiSettings){
    try{AndroidNoti.openNotiSettings();}catch(e){alert('Налаштування → Додатки → Спеціальний доступ → Доступ до сповіщень → Expenses');}
  } else {alert('Авто-додавання працює тільки в APK версії');}
}

function openBattSettings(){
  if(typeof AndroidNoti!=='undefined'&&AndroidNoti.openBatterySettings){
    try{AndroidNoti.openBatterySettings();}catch(e){alert('Налаштування → Додатки → Expenses → Батарея → Без обмежень');}
  }
}

function openNotiSettings(){openNotiSettingsPage();}

function backupShare(){const json=JSON.stringify(state,null,2);
  if(typeof AndroidShare!=='undefined'&&AndroidShare.share)AndroidShare.share('Expenses backup',json);
  else if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(json).then(()=>alert('Скопійовано!')).catch(()=>showExportModal(json));
  else showExportModal(json);}

function showExportModal(json){
  document.getElementById('confirmText').innerHTML='<textarea id="exportArea" style="width:100%;height:200px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px;font-size:11px;font-family:monospace" readonly>'+json.replace(/</g,'&lt;')+'</textarea><br><small>Виділіть все та скопіюйте</small>';
  document.getElementById('confirmOverlay').classList.add('open');
  document.getElementById('confirmBtn').textContent='OK';document.getElementById('confirmBtn').onclick=()=>closeConfirm();
  setTimeout(()=>{const a=document.getElementById('exportArea');if(a){a.focus();a.select();}},100);}

function importFromFile(){const input=document.getElementById('importFile');
  input.onchange=(e)=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();
    reader.onload=(ev)=>{try{const imp=JSON.parse(ev.target.result);if(imp.entries&&imp.categories){migrateData(imp);state=imp;saveState();render();alert('Імпортовано!');return;}}catch(err){}alert('Невірний формат');};
    reader.readAsText(file);input.value='';};input.click();}

function importJSON(){
  document.getElementById('confirmText').innerHTML='<p style="margin-bottom:10px">Вставте JSON:</p><textarea id="importArea" placeholder="JSON сюди..." style="width:100%;height:150px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px;font-size:11px;font-family:monospace"></textarea>';
  document.getElementById('confirmOverlay').classList.add('open');document.getElementById('confirmBtn').textContent='Імпорт';
  document.getElementById('confirmBtn').onclick=()=>{const area=document.getElementById('importArea');
    if(area&&area.value.trim()){try{const imp=JSON.parse(area.value.trim());if(imp.entries&&imp.categories){migrateData(imp);state=imp;saveState();render();closeConfirm();return;}}catch(e){}alert('Невірний формат');}closeConfirm();};}

// === IKO notification parsing ===
function parseIKO(text){
  // Ignore credits/returns
  if(text.indexOf('Uznanie rachunku')>=0)return{};
  const r={};
  // Test mode: Telegram with magic word "exp 50.00 Place"
  const expMatch=text.match(/\bexp\s+([\d.,]+)(?:\s+(.+))?/i);
  if(expMatch){
    r.amount=parseFloat(expMatch[1].replace(',','.'));
    r.place=expMatch[2]?expMatch[2].trim():'Тест';
    return r;
  }
  // Type 1: Card authorization (Autoryzacja transakcji kartowej)
  if(text.indexOf('Kwota:')>=0){
    const kw=text.match(/Kwota:\s*([\d,]+)\s*PLN/i);if(kw)r.amount=parseFloat(kw[1].replace(',','.'));
    const mj=text.match(/Miejsce:\s*(.+?)(?:\.\s*Data|\s*$)/i);if(mj)r.place=mj[1].replace(/\.\s*$/,'').trim();
    const dt=text.match(/Data[^:]*:\s*([\d-]+\s+[\d:]+)/i);if(dt)r.date=dt[1];
    return r;
  }
  // Type 2: Account debit (Obciążenie rachunku) - transfers
  if(text.indexOf('Obciążenie rachunku')>=0||text.indexOf('Obciazenie rachunku')>=0){
    const am=text.match(/-([\d,]+)\s*PLN/i);if(am)r.amount=parseFloat(am[1].replace(',','.'));
    const od=text.match(/Odbiorca:\s*(.+?)(?:\n|Tytu)/i);
    const ty=text.match(/Tytu[łl]:\s*(.+?)(?:\n|Na rach)/i);
    let place='';
    if(od)place=od[1].trim();
    if(ty)place+=(place?' | ':'')+ty[1].trim();
    r.place=place||'Переказ';
    const dw=text.match(/Data[^:]*:\s*([\d-]+)/i);if(dw)r.date=dw[1];
    r.forceCategory='Інше';
    return r;
  }
  return{};
}

function placeKey(place){if(!place)return'';return place.toUpperCase().replace(/[^A-ZА-ЯІЇЄҐ0-9 ]/g,'').replace(/\s+/g,' ').trim().split(/[\s,]+/).slice(0,2).join(' ');}

// === Poll for notifications ===
let lastNotiTime=0;
let processedNotis=new Set(); // Track processed notifications by content hash
function pollNoti(){
  if(typeof AndroidNoti==='undefined')return;
  try{
    const raw=AndroidNoti.getLastNotification();
    if(!raw)return;
    const data=JSON.parse(raw);
    if(!data.text||data.time<=lastNotiTime)return;
    lastNotiTime=data.time;
    // Check if already processed (by content hash)
    const hash=data.text.length+'_'+data.time;
    if(processedNotis.has(hash))return;
    processedNotis.add(hash);
    // Keep only last 50 hashes
    if(processedNotis.size>50){const arr=[...processedNotis];processedNotis=new Set(arr.slice(-30));}
    const parsed=parseIKO(data.text);
    if(parsed.amount){addAutoEntry(parsed.amount,parsed.place||'',parsed.date||'',parsed.forceCategory||null);AndroidNoti.clearLastNotification();}
  }catch(e){}}

setInterval(pollNoti,1000);

// === Helpers ===
function fN(n){return n.toLocaleString('uk-UA',{minimumFractionDigits:2,maximumFractionDigits:2});}
function pad(n){return String(n).padStart(2,'0');}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function eA(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;');}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function shakeEl(el){el.style.borderColor='var(--accent)';el.style.animation='none';el.offsetHeight;el.style.animation='shake .4s ease';setTimeout(()=>{el.style.borderColor='';el.style.animation='';},500);}

const stl=document.createElement('style');stl.textContent='@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}';document.head.appendChild(stl);

document.getElementById('amountInput').addEventListener('keydown',e=>{if(e.key==='Enter')addEntry();});
document.getElementById('newCatInput').addEventListener('keydown',e=>{if(e.key==='Enter')addCategory();});
document.getElementById('catList').addEventListener('click',e=>{const el=e.target.closest('[data-action]');if(!el)return;handleCatAction(el.dataset.action,el.dataset.cat);});

if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
render();
</script>
